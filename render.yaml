services:
  - type: web
    name: cachoviva-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 3001
      - key: UZAPI_BASE_URL
        value: https://api.uzapi.com.br
      - key: UZAPI_TOKEN
        sync: false
      - key: UZAPI_INSTANCE
        sync: false

  - type: web
    name: cachoviva-landing
    env: static
    buildCommand: echo "window.API_BASE = '$API_BASE_URL';" > landing/config.js
    staticPublishPath: landing
    envVars:
      - key: API_BASE_URL
        value: https://cachoviva-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
